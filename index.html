<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
  import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBatYG7fgtozpxnI3UhI35NPLizXpAIhhw",
    authDomain: "calescolar-4d347.firebaseapp.com",
    databaseURL: "https://calescolar-4d347-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "calescolar-4d347",
    storageBucket: "calescolar-4d347.firebasestorage.app",
    messagingSenderId: "645908876195",
    appId: "1:645908876195:web:a47eef335ab616e41fa816"
  };

  const app = initializeApp(firebaseConfig);
  window.auth = getAuth(app);
  window.db = getDatabase(app);

  // Compartir funciones del SDK con el script general
  window.ref = ref;
  window.onValue = onValue;
  window.set = set;
  window.remove = remove;

  // Función de carga de datos segura
 // Bandera de seguridad para que la ficha se abra solo 1 vez
  let fichaUrlAbierta = false;

  // Función de carga de datos segura
  window.cargarDatosFirebase = function() {
      const dbRef = window.ref(window.db, 'inspecciones_transporte');
      window.onValue(dbRef, (snapshot) => {
          window.dbData = snapshot.val() || {};
          console.log("Datos cargados correctamente desde la nube.");
          
          if (typeof window.renderizarPuntosExistentes === 'function') {
              window.renderizarPuntosExistentes();
          }

          // === LÓGICA PARA ABRIR LA FICHA DE INSPECCIÓN ===
          if (!fichaUrlAbierta) {
              const urlParams = new URLSearchParams(window.location.search);
              const lat = parseFloat(urlParams.get('lat'));
              const lng = parseFloat(urlParams.get('lng'));

              if (!isNaN(lat) && !isNaN(lng)) {
                  // Buscamos si existe un registro que coincida con esas coordenadas
                  const idEncontrado = Object.keys(window.dbData).find(id => {
                      const item = window.dbData[id];
                      return item && 
                             Math.abs(parseFloat(item.geoLat) - lat) < 0.0001 && 
                             Math.abs(parseFloat(item.geoLng) - lng) < 0.0001;
                  });

                  if (idEncontrado) {
                      // Usamos un pequeño retardo para asegurar que todo el HTML está listo
                      setTimeout(() => {
                          abrirFormularioEditar(idEncontrado);
                          fichaUrlAbierta = true;
                          // Limpiamos la URL para que no interfiera si recargas la página después
                          window.history.replaceState({}, document.title, window.location.pathname);
                      }, 500);
                  }
              }
          }
      });
  };
  // Función de guardado integrada
  window.guardarDatosFirebase = function(idElemento, nuevosDatos) {
      const dbRef = window.ref(window.db, 'inspecciones_transporte/' + idElemento);
      window.set(dbRef, nuevosDatos)
          .then(() => console.log("Guardado exitoso en Firebase."))
          .catch((error) => console.error("Error al guardar en Firebase:", error));
  };

  // CONTROL DE SESIÓN CENTRALIZADO (Maneja la visibilidad de la pantalla aquí directamente)
  onAuthStateChanged(window.auth, (user) => {
      const modal = document.getElementById('login-modal');
      if (user) {
          console.log("Sesión activa detectada para:", user.email);
          window.cargarDatosFirebase();
          
          // Oculta el login directamente por ID para evitar fallos entre scripts
          if (modal) modal.style.display = 'none';
      } else {
          console.log("No hay sesión activa. Bloqueando pantalla con Login.");
          if (modal) modal.style.display = 'flex';
      }
  });

  // Ejecución del botón del formulario
  window.login = function(email, password) {
      signInWithEmailAndPassword(window.auth, email, password)
          .then((userCredential) => {
              console.log("Inicio de sesión manual correcto:", userCredential.user.email);
              // No hace falta ocultar el modal aquí; 'onAuthStateChanged' lo detectará arriba y lo cerrará solo.
          })
          .catch((error) => {
              console.error("Error de autenticación:", error.code);
              alert("Error al acceder: " + error.message);
          });
  };
</script>

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

     function initMap() {
            // 1. Miramos la URL antes de crear el mapa
            const urlParams = new URLSearchParams(window.location.search);
            const lat = parseFloat(urlParams.get('lat'));
            const lng = parseFloat(urlParams.get('lng'));

            // 2. Si hay coordenadas válidas, centramos ahí con zoom 19. Si no, centro normal en León.
            const centroFinal = (!isNaN(lat) && !isNaN(lng)) ? [lat, lng] : [42.599, -5.567];
            const zoomFinal = (!isNaN(lat) && !isNaN(lng)) ? 19 : 15;

            const query = document.getElementById('searchAddress').value; if (query.trim().length < 3) return;
            fetch(`https://nominatim.openstreetmap.org/search?format=json&viewbox=-7.0,43.2,-3.5,41.0&bounded=1&q=${encodeURIComponent(query)}&accept-language=es`)

                    resContainer.appendChild(div);

        function geocodificarInversa(lat, lng, callback) {
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=es`)
            .then(res => res.json()).then(data => {
                let res = { calle: '', municipio: '', provincia: 'León' };
                if (data && data.address) {
                    res.calle = data.address.road || data.address.pedestrian || '';
                    res.municipio = data.address.city || data.address.town || data.address.village || '';
                    res.provincia = data.address.province || 'León';
                }
                callback(res);
            }).catch(() => callback({ calle: '', municipio: '', provincia: 'León' }));
        }

        function conversionAUtm(lat, lng) {
            try { const r = proj4("WGS84", "EPSG:25830", [lng, lat]); return { x: r[0].toFixed(2), y: r[1].toFixed(2) }; } catch (e) { return { x: "0", y: "0" }; }
        }

function actualizarDesdeUTM() {
    const xStr = document.getElementById('utmX').value;
    const yStr = document.getElementById('utmY').value;
    if (!xStr || !yStr) return;

    try {
        const coordenadas = proj4("EPSG:25830", "WGS84", [parseFloat(xStr), parseFloat(yStr)]);
        // Redondeamos a 6 decimales para las coordenadas geográficas
        const lng = coordenadas[0];
        const lat = coordenadas[1];

        document.getElementById('geoLat').value = lat.toFixed(6);
        document.getElementById('geoLng').value = lng.toFixed(6);

        moverChinchetaYDireccion(lat, lng);
    } catch (e) {
        alert("Las coordenadas UTM introducidas no son válidas.");
    }
}

// 2. Cuando el usuario edita las coordenadas de Google Maps (Lat/Lng)
function actualizarDesdeLatLng() {
    let latCampo = document.getElementById('geoLat');
    let lngCampo = document.getElementById('geoLng');
    
    let latVal = latCampo.value.trim();
    let lngVal = lngCampo.value.trim();

    // 1. EL TRUCO MAGICO: Detección de pegado completo de Google Maps
    // Si pegas "42.599, -5.567" en la latitud, lo detecta y lo divide
    if (latVal.includes(',') && latVal.split(',').length === 2) {
        let partes = latVal.split(',');
        latVal = partes[0].trim();
        lngVal = partes[1].trim();
        
        // Colocamos los números limpios en sus respectivas cajas
        latCampo.value = latVal;
        lngCampo.value = lngVal;
    }

    // Si alguno de los dos está vacío, paramos aquí
    if (!latVal || !lngVal) return;

    try {
        // 2. Parseamos a números de forma segura
        const lat = parseFloat(latVal);
        const lng = parseFloat(lngVal);

        if (isNaN(lat) || isNaN(lng)) return;

        // 3. Calculamos UTM
        const utm = conversionAUtm(lat, lng);
        document.getElementById('utmX').value = utm.x;
        document.getElementById('utmY').value = utm.y;

        // 4. Movemos la chincheta y sacamos la dirección postal
        moverChinchetaYDireccion(lat, lng);
    } catch (e) {
        console.error("Error procesando Lat/Lng", e);
    }
}

// 3. Función centralizada para mover el mapa, la chincheta y rellenar la calle
function moverChinchetaYDireccion(lat, lng) {
    map.setView([lat, lng], 18);

    if (marcadorTemporalEdicion) {
        marcadorTemporalEdicion.setLatLng([lat, lng]);
    } else {
        const iconEdit = L.divIcon({
            html: `<svg width="32" height="32" viewBox="0 0 24 24" fill="#ef4444" stroke="white" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3" fill="white"></circle></svg>`,
            className: 'custom-pin', iconSize: [32, 32], iconAnchor: [16, 32]
        });
        marcadorTemporalEdicion = L.marker([lat, lng], { icon: iconEdit, zIndexOffset: 1000 }).addTo(map);
    }

    // Actualiza los campos de dirección
    geocodificarInversa(lat, lng, function(info) {
        if(document.getElementById('calle')) document.getElementById('calle').value = info.calle;
        if(document.getElementById('municipio')) document.getElementById('municipio').value = info.municipio;
        if(document.getElementById('provincia')) document.getElementById('provincia').value = info.provincia;
    });
}

function procesarImportacion(ev) {
    const f = ev.target.files[0];
    if (!f) return;
    
    const r = new FileReader();
    r.onload = function(e) {
        try {
            const datosDelArchivo = JSON.parse(e.target.result);
            
            // Leemos lo que tiene Firebase actualmente en la ventana global
            const datosActualesEnNube = window.dbData || {};
            
            // Combinamos de forma segura ambos objetos
            const datosCombinados = { ...datosActualesEnNube, ...datosDelArchivo };

            const dbRef = window.ref(window.db, 'inspecciones_transporte');
            
            // Subimos el bloque completo combinado a Firebase
            window.set(dbRef, datosCombinados)
                .then(() => {
                    alert("¡Datos combinados e importados a Firebase con éxito!");
                    ev.target.value = ''; // Limpiamos el input
                })
                .catch((error) => {
                    console.error("Error al subir la importación:", error);
                    alert("No se pudieron guardar los datos en la nube.");
                });

        } catch (err) {
            alert("Archivo inválido o corrupto.");
        }
    };
    r.readAsText(f);
}

        function exportarFichaXMLParaWord() {
            try {
                const form = document.getElementById('inspectionForm');
                const tipoActivo = document.getElementById('elemTipo').value;
                
                // Recopilar de forma segura todos los elementos del formulario abierto
                let fData = {};
                Array.from(form.elements).forEach(el => {
                    if (el.id) {
                        fData[el.id] = el.type === 'checkbox' ? (el.checked ? "SÍ" : "NO") : el.value;
                    }
                    if (el.type === 'radio' && el.checked) {
                        fData[el.name] = el.value;
                    }
                });

                // Helper para extraer campos dinámicos de texto u opciones que pudieran estar vacíos
                const getVal = (id) => fData[id] || "";
                const escapeXml = (str) => String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');

                // Construcción de la cadena XML plana y consolidada
                let xml = `<?xml version="1.0" encoding="UTF-8"?>\n`;

                xml += `    <Conclusiones>${escapeXml(getVal('conclusiones'))}</Conclusiones>\n`;
                
                // 4. Bloque Marquesinas (Radios de Estado + Observaciones de texto adjuntas)
                xml += `    <InspEstructura>${escapeXml(getVal('inspEstructura'))}</InspEstructura>\n`;
                xml += `    <InspEstructuraObs>${escapeXml(getVal('inspEstructura_obs'))}</InspEstructuraObs>\n`;
                xml += `    <InspTecho>${escapeXml(getVal('inspTecho'))}</InspTecho>\n`;

                xml += `    <InspBancos>${escapeXml(getVal('inspBancos'))}</InspBancos>\n`;
                xml += `    <InspBancosObs>${escapeXml(getVal('inspBancos_obs'))}</InspBancosObs>\n`;
                xml += `    <InspCristales>${escapeXml(getVal('inspCristales'))}</InspCristales>\n`;
                xml += `    <InspCristalesObs>${escapeXml(getVal('inspCristales_obs'))}</InspCristalesObs>\n`;

// Función para atrapar coordenadas enviadas desde el PDF
// ==========================================
// CANAL DE COMUNICACIÓN ENTRE PESTAÑAS (PDF a WEB/APP)
// ==========================================
const appChannel = new BroadcastChannel('buscyl_app_channel');

// 1. ESCUCHAR SI SOMOS LA PESTAÑA PRINCIPAL: Otra pestaña nueva nos manda coordenadas
appChannel.onmessage = (event) => {
    if (event.data.type === 'MOVER_MAPA') {
        // Confirmamos de inmediato a la pestaña nueva que ya estamos aquí activos
        appChannel.postMessage({ type: 'RECIBIDO' });
        
        const targetLat = event.data.lat;
        const targetLng = event.data.lng;

        // Centramos el mapa principal con el zoom de detalle (19)
        if (typeof map !== 'undefined') {
            map.setView([targetLat, targetLng], 19);
        }
        
        // Buscamos el punto en el mapa para abrir su ficha/popup
        buscarYFocarMarcador(targetLat, targetLng);
        
        // Forzamos el foco del navegador hacia esta pestaña principal
        window.focus(); 
    }
};

// FUNCIÓN AUXILIAR: Busca el marcador por coordenadas exactas y lo activa
function buscarYFocarMarcador(targetLat, targetLng) {
    // Intento 1: Si usas 'capaMarcadores' como un LayerGroup de Leaflet
    if (typeof capaMarcadores !== 'undefined' && typeof capaMarcadores.eachLayer === 'function') {
        capaMarcadores.eachLayer(function (layer) {
            const pos = layer.getLatLng();
            if (Math.abs(pos.lat - targetLat) < 0.00001 && Math.abs(pos.lng - targetLng) < 0.00001) {
                if (typeof layer.openPopup === 'function') layer.openPopup();
                layer.fire('click'); // Dispara tu evento para abrir el formulario modal
            }
        });
    }
    // Intento 2: Si buscas sobre el array plano 'marcadoresGrupo' de tu index.html
    else if (typeof marcadoresGrupo !== 'undefined' && Array.isArray(marcadoresGrupo)) {
        marcadoresGrupo.forEach(function (layer) {
            if (layer && typeof layer.getLatLng === 'function') {
                const pos = layer.getLatLng();
                if (Math.abs(pos.lat - targetLat) < 0.00001 && Math.abs(pos.lng - targetLng) < 0.00001) {
                    if (typeof layer.openPopup === 'function') layer.openPopup();
                    layer.fire('click'); // Dispara tu evento para abrir el formulario modal
                }
            }
        });
    }
}

// 2. FUNCIÓN PRINCIPAL: Controla la URL y evita duplicar pestañas de la aplicación
function centrarMapaDesdeURL() {
    const urlParams = new URLSearchParams(window.location.search);
    const paramLat = urlParams.get('lat');
    const paramLng = urlParams.get('lng');

    if (paramLat && paramLng) {
        const targetLat = parseFloat(paramLat);
        const targetLng = parseFloat(paramLng);

        // Emitimos la ubicación al canal por si la aplicación ya está abierta en otra pestaña
        appChannel.postMessage({ type: 'MOVER_MAPA', lat: targetLat, lng: targetLng });

        let contestado = false;
        
        // Escuchamos si la pestaña principal nos responde diciendo "¡estoy aquí!"
        const checkRespuesta = (e) => {
            if (e.data.type === 'RECIBIDO') {
                contestado = true;
                appChannel.removeEventListener('message', checkRespuesta);
                
                // Como la otra pestaña ya capturó las coordenadas, cerramos esta de inmediato
                window.close();
                
                // Pantalla de seguridad/confirmación limpia por si el navegador bloquea el auto-cierre
                document.body.innerHTML = `
                    <div style="display:flex; height:100vh; background:#0f172a; color:white; align-items:center; justify-content:center; text-align:center; font-family:sans-serif; flex-direction:column; padding: 20px;">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" style="margin-bottom:16px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        <h2 style="font-size:20px; font-weight:600;">Ubicación enviada a la pestaña activa</h2>
                        <p style="color:#94a3b8; margin-top:8px; font-size:14px;">Ya tienes la aplicación abierta en otro lado. Puedes cerrar esta ventana con seguridad.</p>
                    </div>
                `;
            }
        };
        appChannel.addEventListener('message', checkRespuesta);

        // Damos un margen de 200ms. Si nadie responde en ese tiempo, significa que somos la primera/única pestaña abierta
        setTimeout(() => {
            if (!contestado) {
                appChannel.removeEventListener('message', checkRespuesta);
                
                // Centramos nuestro propio mapa local
                if (typeof map !== 'undefined') {
                    map.setView([targetLat, targetLng], 19);
                }
                
                // Buscamos de forma local el marcador para abrirlo
                buscarYFocarMarcador(targetLat, targetLng);
            }
        }, 200);
    }
}

// para dar tiempo a que el mapa de Leaflet y los puntos base se hayan dibujado.

    setTimeout(centrarMapaDesdeURL, 1000);
